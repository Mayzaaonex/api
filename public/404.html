<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title id="domain-title"></title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root { --bg: #ffffff; --text-primary: #202124; --text-secondary: #5f6368; --text-tertiary: #6c7075; --icon-color: #5f6368; --btn-bg: #1a73e8; --btn-text: #ffffff; --btn-hover: #1765cc; }
  @media (prefers-color-scheme: dark) { :root { --bg: #202124; --text-primary: #e8eaed; --text-secondary: #9aa0a6; --text-tertiary: #80868b; --icon-color: #9aa0a6; --btn-bg: #8ab4f8; --btn-text: #202124; --btn-hover: #aecbfa; } }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
  .container { max-width: 600px; margin: 0 auto; padding: 100px 32px 0 32px; }
  .icon { width: 40px; height: 40px; margin-bottom: 28px; }
  .icon svg { width: 100%; height: 100%; stroke: var(--icon-color); fill: none; }
  h1 { font-size: 20px; font-weight: 500; color: var(--text-primary); margin: 0 0 16px 0; line-height: 1.4; }
  .description { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin: 0 0 8px 0; }
  .description b { font-weight: 700; color: var(--text-secondary); }
  .error-code { font-size: 12px; color: var(--text-tertiary); margin: 24px 0 0 0; letter-spacing: 0.2px; }
  .reload-wrap { display: flex; justify-content: flex-end; margin-top: 190px; }
  button.reload { background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: 4px; padding: 9px 24px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
  button.reload:hover { background: var(--btn-hover); }
</style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 15a1 1 0 1 0 0-2 1 1 0 0 0 0 2z" fill="currentColor" stroke="none"/><circle cx="9.5" cy="14.5" r="0.6" fill="var(--icon-color)" stroke="none"/><circle cx="14.5" cy="14.5" r="0.6" fill="var(--icon-color)" stroke="none"/><path d="M9 18c0.8-1 2.2-1 3 0" stroke-linecap="round"/></svg>
    </div>
    <h1>This site can&rsquo;t be reached</h1>
    <p class="description"><b id="error-domain">example.com</b>&rsquo;s server IP address could not be found.</p>
    <p class="error-code">DNS_PROBE_FINISHED_NXDOMAIN</p>
    <div class="reload-wrap">
      <button class="reload" onclick="location.reload()">Reload</button>
    </div>
  </div>
</body>
<script>
  // Domain dinamis dari URL yang diakses
  const domain = window.location.hostname + window.location.pathname;
  document.getElementById('error-domain').textContent = domain;
  document.title = domain + ' - DNS Error';
</script>
</html>
